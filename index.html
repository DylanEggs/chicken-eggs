<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Eggs</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="app">
    <header class="appHeader">
      <div class="logo">🥚</div>
      <div>
        <p class="eyebrow">Farm Dashboard</p>
        <h1>Chicken Eggs</h1>
        <p id="todayText"></p>
      </div>
    </header>

    <section id="dashboard" class="screen active">
      <div class="heroCard">
        <div>
          <p class="eyebrow">Today’s Farm</p>
          <h2>Egg Production</h2>
          <p>Track collections, sales, records, and revenue.</p>
        </div>
        <div class="heroIcon">🐔</div>
      </div>

      <div id="dashboardTotals" class="dashboardGrid"></div>

      <div class="mainActions">
        <button onclick="showScreen('collect')">🥚 Collect Eggs</button>
        <button onclick="showScreen('sale')">💰 Record Sale</button>
      </div>
    </section>

    <section id="collect" class="screen">
      <div class="screenTitle">
        <button class="backMini" onclick="showScreen('dashboard')">←</button>
        <h2>Collect Eggs</h2>
      </div>

      <label>Date</label>
      <input type="date" id="eggDate" />

      <label>Eggs Collected</label>
      <input type="number" id="eggCount" placeholder="0" />

      <button onclick="saveEggs()">Save Eggs</button>
      <button class="secondary" onclick="showScreen('dashboard')">Back</button>
    </section>

    <section id="sale" class="screen">
      <div class="screenTitle">
        <button class="backMini" onclick="showScreen('dashboard')">←</button>
        <h2>Record Sale</h2>
      </div>

      <label>Date</label>
      <input type="date" id="saleDate" />

      <label>Dozen Sold</label>
      <input type="number" id="dozenSold" placeholder="0" />

      <label>Price Per Dozen</label>
      <input type="number" id="dozenPrice" step="0.01" placeholder="0.00" />

      <label>18-Packs Sold</label>
      <input type="number" id="packSold" placeholder="0" />

      <label>Price Per 18-Pack</label>
      <input type="number" id="packPrice" step="0.01" placeholder="0.00" />

      <button onclick="saveSale()">Save Sale</button>
      <button class="secondary" onclick="showScreen('dashboard')">Back</button>
    </section>

    <section id="stats" class="screen">
      <div class="screenTitle">
        <button class="backMini" onclick="showScreen('dashboard')">←</button>
        <h2>Statistics</h2>
      </div>

      <div id="statsTotals" class="grid"></div>
      <button class="secondary" onclick="showScreen('dashboard')">Back</button>
    </section>

    <section id="records" class="screen">
      <div class="screenTitle">
        <button class="backMini" onclick="showScreen('dashboard')">←</button>
        <h2>Records</h2>
      </div>

      <div id="recordsTotals" class="grid"></div>
      <button class="secondary" onclick="showScreen('dashboard')">Back</button>
    </section>

    <section id="history" class="screen">
      <div class="screenTitle">
        <button class="backMini" onclick="showScreen('dashboard')">←</button>
        <h2>History</h2>
      </div>

      <input
        type="text"
        id="historySearch"
        placeholder="Search by date, example: 2026-07"
        oninput="updateApp()"
      />

      <div class="filterButtons">
        <button onclick="setHistoryFilter('all')">All</button>
        <button onclick="setHistoryFilter('eggs')">🥚 Eggs</button>
        <button onclick="setHistoryFilter('sale')">💰 Sales</button>
      </div>

      <div id="historyList"></div>

      <button class="secondary" onclick="showScreen('dashboard')">Back</button>
    </section>

    <nav class="bottomNav">
      <button onclick="showScreen('dashboard')">🏠<span>Home</span></button>
      <button onclick="showScreen('stats')">📊<span>Stats</span></button>
      <button onclick="showScreen('records')">🏆<span>Records</span></button>
      <button onclick="showScreen('history')">📋<span>History</span></button>
    </nav>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
